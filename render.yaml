services:
  # ── Full-stack Web Service (API + Frontend) ────────────────────
  - type: web
    name: goatcasino
    runtime: node
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && node index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
